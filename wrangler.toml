name = "rifa"
main = "src/worker.ts"
compatibility_date = "2026-05-06"

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "rifa"
# Defina o database_id no ambiente de deploy (ex.: [env.production]).

[vars]
TENANT_ENABLED = "1"
TENANT_ROOT_DOMAIN = "rifinha.org"
TENANT_DEFAULT_ID = "default"
TENANT_IGNORED_SUBDOMAINS = "www"
RIFAS_JSON = '{"default":[{"id":"rifa-principal","nome":"Rifa Solidária","preco":10,"totalNumeros":1000}],"maya":[{"id":"rifa-maya","nome":"Rifa Maya","preco":20,"totalNumeros":200}]}'
#MERCADO_PAGO_ACCESS_TOKEN = '{"default":"TOKEN_PADRAO","maya":"TOKEN_DO_TENANT_MAYA"}'
MERCADO_PAGO_PUBLIC_KEY = '{"default":"APP_USR-a1e2d024-456c-4e75-8f93-b6eab6d96083","maya":"APP_USR-a1dacbeb-d662-40f7-b1e8-51cd842e4929"}'
