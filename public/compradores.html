<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Compradores | Rifa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero py-4 py-md-5">
      <div class="container">
        <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
          <div>
            <span class="badge text-bg-light mb-2">Rifa online</span>
            <h1 class="h2 mb-1">Compradores por tenant</h1>
            <p class="mb-0 text-white-50">Lista de compradores salvos no Cloudflare D1.</p>
          </div>
          <a href="/" class="btn btn-outline-light">Voltar para rifa</a>
        </div>
      </div>
    </header>

    <main class="py-4 py-md-5">
      <div class="container">
        <section class="card border-0 shadow-sm">
          <div class="card-body p-3 p-md-4">
            <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
              <div>
                <h2 class="h5 mb-1">Tenant: <span id="tenantId" class="text-primary">-</span></h2>
                <p class="text-secondary mb-0">Mostrando os registros mais recentes.</p>
              </div>
              <span id="buyersCount" class="badge text-bg-secondary">0 compradores</span>
            </div>

            <div id="statusMessage" class="alert d-none mb-3" role="alert"></div>

            <div class="table-responsive">
              <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col">Data</th>
                    <th scope="col">Nome</th>
                    <th scope="col">Telefone</th>
                    <th scope="col">Rifa</th>
                    <th scope="col" class="text-end">Qtd</th>
                    <th scope="col" class="text-end">Total</th>
                    <th scope="col">Status</th>
                  </tr>
                </thead>
                <tbody id="buyersTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="/config.js"></script>
    <script src="/compradores.js"></script>
  </body>
</html>
