<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rifa</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="hero py-5">
      <div class="container">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            <span class="badge text-bg-light mb-3">Rifa online</span>
            <h1 class="display-5 fw-bold mb-3">Escolha seus números</h1>
          </div>
        </div>
      </div>
    </header>

    <main class="pb-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-xl-7">
            <section class="card border-0 shadow-sm h-100">
              <div class="card-body p-4">
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                  <h2 class="h4 mb-0">1. Selecione seus números</h2>
                  <span class="text-secondary small">Toque para marcar/desmarcar</span>
                </div>
                <div id="numbersGrid" class="numbers-grid"></div>
              </div>
            </section>
          </div>

          <div class="col-xl-5">
            <section class="card border-0 shadow-sm mb-4">
              <div class="card-body p-4">
                <h2 class="h4 mb-3">2. Dados para registro</h2>
                <form id="buyerForm" novalidate>
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="name" class="form-label">Nome completo</label>
                      <input id="name" name="name" class="form-control" required />
                    </div>
                    <div class="col-12">
                      <label for="phone" class="form-label">Telefone</label>
                      <input id="phone" name="phone" type="tel" class="form-control" placeholder="(00) 00000-0000" required />
                    </div>
                  </div>

                  <hr class="my-4" />

                  <h3 class="h6 text-uppercase text-secondary">Resumo do pedido</h3>
                  <p class="mb-1"><strong>Números:</strong> <span id="selectedNumbers">Nenhum</span></p>
                  <p class="mb-3"><strong>Total:</strong> R$ <span id="totalAmount">0,00</span></p>

                  <button id="payButton" type="submit" class="btn btn-primary w-100 py-2">
                    Ir para pagamento Mercado Pago
                  </button>

                  <button id="confirmButton" type="button" class="btn btn-outline-success w-100 py-2 mt-2 d-none">
                    Já paguei, confirmar pagamento
                  </button>
                </form>
                <div id="statusMessage" class="alert mt-3 d-none" role="alert"></div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
